<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expresiones J&M 🌹</title>
  <meta name="description" content="Rosas eternas hechas con amor. Ramos, materiales y comunidad emprendedora."/>
  <meta property="og:title" content="Expresiones J&M 🌹" />
  <meta property="og:description" content="Rosas eternas hechas con amor. Ramos personalizados, materiales para emprender y comunidad de emprendedoras." />
  <meta property="og:image" content="https://gardeneternaljym.github.io/logo-primavera-letras.png" />
  <meta property="og:url" content="https://gardeneternaljym.github.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_PE" />
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f5ede6;
      color: #3b1a0e;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 0 0 32px;
    }

    .logo-img {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid #e0a090;
      display: block;
      margin: 0 auto 14px;
      background: #f5ede6;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      font-weight: 400;
      color: #c1644a;
      margin-bottom: 5px;
    }

    .hero h1 em { font-style: italic; }

    .hero p {
      font-size: .8rem;
      color: #a07060;
    }

    .divider {
      height: 1.5px;
      background: #e0a090;
      border-radius: 2px;
      margin: 0 0 28px;
    }

    /* SECTIONS */
    .section { margin-bottom: 28px; }

    .section-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #b07060;
      margin-bottom: 10px;
    }

    /* BUTTONS */
    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 16px;
      background: #fdf6f0;
      border: 1.5px solid #e0a090;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      color: #3b1a0e;
      font-family: 'Nunito', sans-serif;
      font-size: .88rem;
      transition: background .15s, transform .1s;
      margin-bottom: 8px;
    }

    .btn:hover  { background: #f5d8cc; }
    .btn:active { transform: scale(.98); }

    .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #f5d8cc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .btn-text { flex: 1; text-align: left; }
    .btn-text strong { display: block; font-size: .86rem; font-weight: 600; }
    .btn-text span   { display: block; font-size: .72rem; color: #a07060; }
    .btn-arrow { font-size: 1.1rem; color: #c1644a; }

    /* SOCIAL */
    .social-row { display: flex; gap: 8px; }

    .social-btn {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      background: #fdf6f0;
      border: 1.5px solid #e0a090;
      border-radius: 14px;
      font-size: .73rem;
      font-weight: 600;
      color: #a07060;
      text-decoration: none;
      transition: background .15s;
    }

    .social-btn:hover { background: #f5d8cc; }

    /* FOOTER */
    .footer {
      text-align: center;
      font-size: .68rem;
      color: #a07060;
      margin-top: 32px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="page">

  <header class="hero">
    <img class="logo-img" src="logo2.png" alt="Expresiones J&M"/>
    <h1>Expresiones <em>J&amp;M</em></h1>
    <p>Rosas eternas hechas con amor &middot; Perú</p>
  </header>

  <div class="divider"></div>

  <main>

    <!-- PARA REGALAR -->
    <div class="section">
      <p class="section-label">Para regalar</p>
      <a onclick="abrirWhatsApp('Hola, quiero pedir un ramo 🌸')" class="btn">
        <div class="btn-icon">🌸</div>
        <div class="btn-text">
          <strong>Pedir mi ramo</strong>
          <span>Personalizado, hecho a mano</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>
    </div>

    <!-- PARA EMPRENDER -->
    <div class="section">
      <p class="section-label">Para emprender</p>
      <a onclick="abrirWhatsApp('Hola, me interesan los materiales 🌷')" class="btn">
        <div class="btn-icon">🪷</div>
        <div class="btn-text">
          <strong>Comprar materiales</strong>
          <span>Flores, cintas, bases y más</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>
      <a href="https://chat.whatsapp.com/CMHPDhzzyfnKDMrn21aZUr" class="btn">
        <div class="btn-icon">💐</div>
        <div class="btn-text">
          <strong>Comunidad gratis</strong>
          <span>Aprende y crece con nosotras</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>
    </div>

    <!-- REDES -->
    <div class="section">
      <p class="section-label">Síguenos</p>
      <div class="social-row">
        <a href="https://www.tiktok.com/@garden_eternal" target="_blank" class="social-btn">TikTok</a>
        <a href="https://www.instagram.com/gardeneternal_jm/" target="_blank" class="social-btn">Instagram</a>
        <a href="https://www.facebook.com/people/Garden-Rosas-Eternas/61574939932181/?locale=es_LA" target="_blank" class="social-btn">Facebook</a>
      </div>
    </div>

  </main>

  <footer class="footer">
    Expresiones J&amp;M &copy; 2026 &middot; Perú
  </footer>

</div>

<script>
  function abrirWhatsApp(texto) {
    var numero = '51956744914';
    var t = encodeURIComponent(texto);
    window.location.href = 'whatsapp://send?phone=' + numero + '&text=' + t;
    setTimeout(function() {
      window.location.href = 'https://wa.me/' + numero + '?text=' + t;
    }, 1500);
  }
</script>

</body>
</html>
